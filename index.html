<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        body {
            background: #000;
        }

        canvas#bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .text {
            position: absolute;
            color: #ff0000;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #cc0000;
            white-space: nowrap;
            z-index: 1;
            pointer-events: none;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            text-align: center;
            font-size: 24px;
            opacity: 0;
            transition: 1.5s ease;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.8);
        }

        .message.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .button {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 30px;
            background: linear-gradient(135deg, #ff4d6d, #ff1040);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #ff4d6d, 0 0 40px rgba(255, 16, 64, 0.4);
            z-index: 10;
            animation: btnPulse 2s infinite;
        }

        @keyframes btnPulse {

            0%,
            100% {
                box-shadow: 0 0 20px #ff4d6d, 0 0 40px rgba(255, 16, 64, 0.3);
            }

            50% {
                box-shadow: 0 0 30px #ff4d6d, 0 0 60px rgba(255, 16, 64, 0.6);
            }
        }
    </style>
</head>

<body>
    <canvas id="bg"></canvas>

    <div class="message" id="msg">
        💖 I have something to tell you... <br><br>
        You are the reason I smile every day ❤️ <br><br>
        <b style="font-size:36px;color:#9d0909;text-shadow:0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #cc0000;">I LOVE
            YOU</b>
    </div>

    <button class="button" onclick="reveal()">Tap here ❤️</button>

    <audio id="music" loop>
        <!-- Download from: https://www.bensound.com/royalty-free-music/track/angels-by-my-side-touching-folk -->
        <!-- Save as angels.mp3 in the same folder as this HTML file -->
        <source src="bensound-angelsbymyside.mp3" type="audio/mp3">
    </audio>

    <script>
        // === BACKGROUND CANVAS: stars, shooting stars, nebula, galaxy swirl ===
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Stars
        const stars = [];
        for (let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * 2000,
                y: Math.random() * 2000,
                r: Math.random() * 2 + 0.3,
                speed: Math.random() * 0.02 + 0.005,
                phase: Math.random() * Math.PI * 2
            });
        }

        // Shooting stars
        const shooters = [];
        function maybeShoot() {
            if (Math.random() < 0.012) {
                shooters.push({
                    x: Math.random() * W * 0.8,
                    y: Math.random() * H * 0.3,
                    vx: 4 + Math.random() * 4,
                    vy: 2 + Math.random() * 2,
                    life: 1,
                    len: 60 + Math.random() * 40
                });
            }
        }

        let frame = 0;

        function drawBackground() {
            frame++;

            // Sky gradient
            let g = ctx.createRadialGradient(W * 0.5, H * 0.8, 0, W * 0.5, H * 0.5, W);
            g.addColorStop(0, '#0b1a3a');
            g.addColorStop(0.4, '#060d24');
            g.addColorStop(1, '#000000');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            // Nebula clouds
            let nebulas = [
                { x: W * 0.3, y: H * 0.35, r: 200, c1: 'rgba(120,30,80,0.06)', c2: 'rgba(120,30,80,0)' },
                { x: W * 0.7, y: H * 0.25, r: 180, c1: 'rgba(30,50,120,0.07)', c2: 'rgba(30,50,120,0)' },
                { x: W * 0.5, y: H * 0.6, r: 250, c1: 'rgba(100,20,60,0.05)', c2: 'rgba(100,20,60,0)' },
            ];
            let pulse = 0.7 + 0.3 * Math.sin(frame * 0.008);
            nebulas.forEach(n => {
                let ng = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * pulse);
                ng.addColorStop(0, n.c1);
                ng.addColorStop(1, n.c2);
                ctx.fillStyle = ng;
                ctx.fillRect(0, 0, W, H);
            });

            // Galaxy swirl (subtle rotating dots)
            ctx.save();
            ctx.translate(W * 0.5, H * 0.45);
            ctx.rotate(frame * 0.0003);
            for (let i = 0; i < 80; i++) {
                let angle = i * 0.3 + frame * 0.001;
                let dist = 40 + i * 2.5;
                let sx = Math.cos(angle) * dist;
                let sy = Math.sin(angle) * dist * 0.5;
                let a = 0.15 - i * 0.0015;
                if (a < 0) a = 0;
                ctx.beginPath();
                ctx.arc(sx, sy, 1, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180,160,255,${a})`;
                ctx.fill();
            }
            ctx.restore();

            // Stars
            stars.forEach(s => {
                let sx = s.x % W;
                let sy = s.y % H;
                let tw = 0.4 + 0.6 * Math.sin(frame * s.speed + s.phase);
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(0.1, s.r * tw), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.3 + tw * 0.7})`;
                ctx.fill();
            });

            // Shooting stars
            maybeShoot();
            for (let i = shooters.length - 1; i >= 0; i--) {
                let ss = shooters[i];
                ss.x += ss.vx;
                ss.y += ss.vy;
                ss.life -= 0.015;
                if (ss.life <= 0) { shooters.splice(i, 1); continue; }

                let grad = ctx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * 12, ss.y - ss.vy * 12);
                grad.addColorStop(0, `rgba(255,255,255,${ss.life})`);
                grad.addColorStop(1, `rgba(255,255,255,0)`);
                ctx.beginPath();
                ctx.moveTo(ss.x, ss.y);
                ctx.lineTo(ss.x - ss.vx * 12, ss.y - ss.vy * 12);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Glow head
                ctx.beginPath();
                ctx.arc(ss.x, ss.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${ss.life})`;
                ctx.fill();
            }
        }

        // === HEART TEXT (flowing "I love you") ===
        const words = [];
        const total = 90;
        for (let i = 0; i < total; i++) {
            let span = document.createElement("span");
            span.className = "text";
            span.innerText = "I love you";
            document.body.appendChild(span);
            words.push({ el: span, t: (i / total) * Math.PI * 2 });
        }

        function animateHeart() {
            let neonPulse = 0.8 + 0.2 * Math.sin(frame * 0.04);
            words.forEach((w, idx) => {
                w.t += 0.003;
                let t = w.t;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                w.el.style.left = (x * 14 + W / 2) + "px";
                w.el.style.top = (-y * 14 + H / 2) + "px";
                w.el.style.opacity = neonPulse;
            });
        }

        // === MAIN LOOP ===
        function loop() {
            drawBackground();
            animateHeart();
            requestAnimationFrame(loop);
        }
        loop();

        // === REVEAL ===
        function reveal() {
            document.getElementById("msg").classList.add("show");
            document.querySelector(".button").style.display = "none";
            try { document.getElementById("music").play(); } catch (e) { }
        }
    </script>
</body>

</html>
